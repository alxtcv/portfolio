<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALXART</title>

<style>
  body {
    background-color: #008080;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Tahoma, sans-serif;
    overflow-x: hidden; /* prevent side scroll */
  }

  .layout {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* Side Ad Boxes */
  .ad-box {
    width: 340px;
    height: 750px;
    background: #c0c0c0;
    border: 3px solid #000;
    box-shadow: 6px 6px 0 #000;
    overflow: hidden;
  }

  .ad-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Main Window */
  .window {
    width: 920px;
    height: 500px;
    background-color: #c0c0c0;
    border: 3px solid #000;
    box-shadow: 6px 6px 0 #000;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: height 0.3s ease;
  }

  .window.tall {
    height: 750px;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title-buttons {
    display: flex;
    gap: 5px;
  }

  .btn {
    width: 18px;
    height: 18px;
    background-color: #c0c0c0;
    border: 1px solid #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
  }

  .menu-bar {
    padding: 6px 10px;
  }

  .menu-bar span {
    margin-right: 20px;
    cursor: pointer;
  }

  .menu-bar span:hover {
    text-decoration: underline;
  }

  .content {
    background: white;
    flex: 1;
    padding: 20px;
    overflow-y: auto;  /* vertical scroll only */
    overflow-x: hidden; /* prevent sideways scroll */
    font-family: "Courier New", monospace;
    font-size: 15px;
  }

  .tab {
    display: none;
  }

  .tab.active {
    display: block;
  }

  .color-control {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  .color-button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #000;
    cursor: pointer;
    padding: 0;
  }

  .color-button::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  .color-button::-webkit-color-swatch {
    border: none;
    border-radius: 50%;
  }

</style>
</head>

<body>

<div class="layout">

  <!-- LEFT AD -->
  <div class="ad-box">
    <!-- PUT IMAGE URL BELOW -->
    <img src="https://image2url.com/r2/default/images/1772611348973-dafe425a-4178-442d-8d0e-ef7ca43a838a.png">
  </div>

  <!-- MAIN WINDOW -->
  <div class="window" id="mainWindow">

    <div class="title-bar">
      <div>Alex Tchukharev - Portfolio</div>
      <div class="title-buttons">
        <div class="btn">_</div>
        <div class="btn">□</div>
        <div class="btn">X</div>
      </div>
    </div>

    <div class="menu-bar">
      <span onclick="openTab('file')">Home</span>
      <span onclick="openTab('edit')">Art</span>
      <span onclick="openTab('search')">Myself</span>
      <span onclick="openTab('draw')">Draw</span>
      <span onclick="openTab('help')">Contact</span>
    </div>

    <div class="content">
    <script>
const mainWindow = document.getElementById("mainWindow");
const titleButtons = document.querySelectorAll(".title-buttons div");

let isFullScreen = false;
let isMinimized = false;

// Fullscreen / restore (□)
titleButtons[1].addEventListener("click", () => {
  if (isMinimized) return; // cannot fullscreen while minimized

  if (!isFullScreen) {
    // Save current size and position
    mainWindow.dataset.width = mainWindow.style.width;
    mainWindow.dataset.height = mainWindow.style.height;
    mainWindow.dataset.top = mainWindow.style.top;
    mainWindow.dataset.left = mainWindow.style.left;
    mainWindow.dataset.position = mainWindow.style.position;
    mainWindow.dataset.zIndex = mainWindow.style.zIndex;

    mainWindow.style.width = window.innerWidth - 40 + "px";
    mainWindow.style.height = window.innerHeight - 40 + "px";
    mainWindow.style.position = "fixed";
    mainWindow.style.top = "20px";
    mainWindow.style.left = "20px";
    mainWindow.style.zIndex = 9999;

    isFullScreen = true;
  } else {
    // Restore previous size
    mainWindow.style.width = mainWindow.dataset.width;
    mainWindow.style.height = mainWindow.dataset.height;
    mainWindow.style.top = mainWindow.dataset.top;
    mainWindow.style.left = mainWindow.dataset.left;
    mainWindow.style.position = mainWindow.dataset.position;
    mainWindow.style.zIndex = mainWindow.dataset.zIndex;

    isFullScreen = false;
  }
});

// Minimize (_)
titleButtons[0].addEventListener("click", () => {
  if (isFullScreen) return; // cannot minimize while fullscreen

  const content = mainWindow.querySelector(".content, .menu-bar, .color-control");
  if (!isMinimized) {
    content.style.display = "none";
    mainWindow.style.height = "auto"; // shrink to title bar
    isMinimized = true;
  } else {
    content.style.display = "flex"; // restore content layout
    mainWindow.style.height = ""; // restore previous height
    isMinimized = false;
  }
});

// Close (X)
titleButtons[2].addEventListener("click", () => {
  mainWindow.style.display = "none";
});

// Reopen button (optional)
const reopenBtn = document.createElement('button');
reopenBtn.innerText = 'Open Portfolio';
reopenBtn.style.position = 'fixed';
reopenBtn.style.bottom = '20px';
reopenBtn.style.right = '20px';
reopenBtn.style.zIndex = 10000;
document.body.appendChild(reopenBtn);

reopenBtn.addEventListener('click', () => {
  mainWindow.style.display = 'flex';
});
</script>

<div id="draw" class="tab">
  <b>Draw something :)</b><br><br>

  <div style="display:flex; flex-direction:column; align-items:flex-start;">
    <canvas id="drawCanvas" width="500" height="400"
      style="border:2px solid #000; background:white; cursor:crosshair;">
    </canvas>

    <div style="margin-top:10px;">
      <button onclick="toggleEraser()">Eraser/Paint</button>
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="saveCanvas()">Save Image</button>
    </div>
  </div>
  <script>
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let eraser = false;
let brushColor = 'black';
let brushSize = 5;

// Initial canvas size
canvas.width = 500;
canvas.height = 400;

// Create control panel dynamically
const drawContainer = canvas.parentElement;
const controlPanel = document.createElement('div');
controlPanel.style.marginBottom = '10px';
controlPanel.style.display = 'flex';
controlPanel.style.alignItems = 'center';
controlPanel.style.gap = '10px';

// Brush color picker
const colorLabel = document.createElement('span');
colorLabel.innerText = 'Brush color: ';
const colorInput = document.createElement('input');
colorInput.type = 'color';
colorInput.value = brushColor;
colorInput.addEventListener('input', e => { brushColor = e.target.value; eraser = false; });

// Brush size slider
const sizeLabel = document.createElement('span');
sizeLabel.innerText = 'Brush size: ';
const sizeInput = document.createElement('input');
sizeInput.type = 'range';
sizeInput.min = 1;
sizeInput.max = 50;
sizeInput.value = brushSize;
sizeInput.addEventListener('input', e => { brushSize = parseInt(e.target.value); });

// Canvas width slider
const widthLabel = document.createElement('span');
widthLabel.innerText = 'Canvas width: ';
const widthSlider = document.createElement('input');
widthSlider.type = 'range';
widthSlider.min = 200;
widthSlider.max = 1830;
widthSlider.value = canvas.width;
widthSlider.addEventListener('input', e => {
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = e.target.value;
  tempCanvas.height = canvas.height;
  tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = e.target.value;
  ctx.drawImage(tempCanvas, 0, 0);
  fillWhiteBackground();
});

// Canvas height slider
const heightLabel = document.createElement('span');
heightLabel.innerText = 'Canvas height: ';
const heightSlider = document.createElement('input');
heightSlider.type = 'range';
heightSlider.min = 200;
heightSlider.max = 2000;
heightSlider.value = canvas.height;
heightSlider.addEventListener('input', e => {
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = e.target.value;
  tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
  canvas.height = e.target.value;
  ctx.drawImage(tempCanvas, 0, 0);
  fillWhiteBackground();
});

// Append all controls
controlPanel.appendChild(colorLabel);
controlPanel.appendChild(colorInput);
controlPanel.appendChild(sizeLabel);
controlPanel.appendChild(sizeInput);
controlPanel.appendChild(widthLabel);
controlPanel.appendChild(widthSlider);
controlPanel.appendChild(heightLabel);
controlPanel.appendChild(heightSlider);

drawContainer.insertBefore(controlPanel, canvas);

// Mouse drawing events
canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  if (eraser) {
    ctx.clearRect(e.offsetX - brushSize, e.offsetY - brushSize, brushSize*2, brushSize*2);
  } else {
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseout', () => drawing = false);

// Toggle eraser
function toggleEraser() { eraser = !eraser; }

// Clear canvas
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); fillWhiteBackground(); }

// Fill white background
function fillWhiteBackground() {
  ctx.save();
  ctx.globalCompositeOperation = 'destination-over';
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}

// Save canvas as PNG with white background
function saveCanvas() {
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.fillStyle = 'white';
  tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'drawing.png';
  link.href = tempCanvas.toDataURL();
  link.click();
}

// Initialize white background
fillWhiteBackground();
</script>
</div>
<script>
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;
  let eraser = false;

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    if (eraser) {
      ctx.clearRect(e.offsetX-5, e.offsetY-5, 10, 10);
    } else {
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  });

  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseout', () => drawing = false);

  function toggleEraser() {
    eraser = !eraser;
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function saveCanvas() {
    const link = document.createElement('a');
    link.download = 'drawing.png';
    link.href = canvas.toDataURL();
    link.click();
  }
</script>

<script>
  const windowBox = document.getElementById("mainWindow");

  function openTab(tabId) {
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => tab.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");

    if (tabId === "file" || tabId === "help") {
      windowBox.classList.remove("tall");
    } else {
      windowBox.classList.add("tall");
    }
  }

  const picker = document.getElementById("bgPicker");

  picker.addEventListener("input", function() {
    document.body.style.backgroundColor = this.value;
  });
</script>
